appId: org.videoeditor.desktop
productName: Video Editor
asar: true
npmRebuild: false
directories:
  output: out
files:
  - "dist/main/**"
  - "dist/preload/**"
  - "dist/renderer/**"
  - "native/**"
  - "package.json"
asarUnpack:
  - "native/**"
mac:
  identity: null
  target:
    - target: dir
  category: public.app-category.video
win:
  target:
    - target: dir
linux:
  target:
    - target: dir

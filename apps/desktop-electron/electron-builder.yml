appId: org.videoeditor.desktop
productName: Video Editor
asar: true
npmRebuild: false
electronDist: node_modules/electron/dist
directories:
  output: out
files:
  - "dist/main/**"
  - "dist/preload/**"
  - "dist/renderer/**"
  - "native/**"
  - "package.json"
asarUnpack:
  - "native/**"
extraResources:
  - from: "runtime/ffmpeg"
    to: "ffmpeg"
    filter:
      - "**/*"
mac:
  identity: null
  target:
    - target: dir
  category: public.app-category.video
win:
  target:
    - target: dir
linux:
  target:
    - target: dir
